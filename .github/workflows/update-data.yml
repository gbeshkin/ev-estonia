name: Update EV charging data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,17 * * *'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate chargers.json
        env:
          OCM_API_KEY: ${{ secrets.OCM_API_KEY }}
        run: python scripts/fetch_ocm_estonia.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/chargers.json
          git diff --cached --quiet || git commit -m "Update EV charging data"
          git push
